<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | RCPIT Alumni Network</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://www.rcpit.ac.in/images/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f1f5f9;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .messages-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex: 1;
            margin: 20px;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-strong);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Contacts List */
        .contacts-sidebar {
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            background: #f8fafc;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
        }

        .search-box {
            background: #f1f5f9;
            padding: 10px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }

        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid #f1f5f9;
        }

        .contact-item:hover, .contact-item.active {
            background: white;
        }

        .contact-item.active {
            border-left: 4px solid var(--primary);
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
            position: relative;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #10b981;
            border: 2px solid white;
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
            right: -2px;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-info h4 {
            font-size: 1rem;
            color: var(--primary-dark);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Chat Window */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: white;
        }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .messages-display {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #f8fafc;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .msg-received {
            background: white;
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .msg-sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(43, 82, 106, 0.2);
        }

        .msg-time {
            font-size: 0.75rem;
            margin-top: 5px;
            display: block;
            opacity: 0.7;
        }

        .chat-footer {
            padding: 20px 25px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .message-input {
            flex: 1;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 20px;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }

        .message-input:focus {
            border-color: var(--primary);
            background: white;
        }

        .action-icon {
            font-size: 1.3rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
        }

        .action-icon:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .messages-container {
                grid-template-columns: 1fr;
                margin: 0;
                border-radius: 0;
            }
            .contacts-sidebar {
                display: none; /* Mobile view would need a toggle */
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <div class="logo-container">
                <a href="profile.html" class="nav-profile-trigger" id="navProfileTrigger">
                    <div class="profile-avatar-xs" id="navAvatar">U</div>
                    <span class="nav-user-name" id="navUserName">User</span>
                </a>
                <a href="index.html" class="logo-group">
                    <span class="logo-sub">RCPIT Hub</span>
                    <span class="logo-text">Message <span style="color: var(--accent);">Center</span></span>
                </a>
            </div>
            <div class="nav-menu">
                <ul>
                    <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                    <li><a href="alumni-list.html" class="nav-link">Network</a></li>
                    <li><a href="jobs.html" class="nav-link">Jobs</a></li>
                </ul>
            </div>
            <div class="nav-btns">
                <a href="profile.html" class="btn btn-primary btn-sm">My Profile</a>
            </div>
        </div>
    </nav>

    <div class="messages-container">
        <!-- Sidebar -->
        <aside class="contacts-sidebar">
            <div class="sidebar-header">
                <h3 class="font-outfit" style="margin-bottom: 15px;">Messages</h3>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search conversations...">
                </div>
            </div>
            <div class="contacts-list" id="contactsList">
                <!-- JS -->
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-user">
                    <div class="avatar" id="activeAvatar">RP</div>
                    <div>
                        <h4 id="activeName" class="font-outfit">Rahul Patil</h4>
                        <small style="color: #10b981; font-weight: 600;">Online</small>
                    </div>
                </div>
                <div style="display: flex; gap: 20px;">
                    <i class="fas fa-video action-icon"></i>
                    <i class="fas fa-phone action-icon"></i>
                    <i class="fas fa-info-circle action-icon"></i>
                </div>
            </header>

            <div class="messages-display" id="messageBox">
                <!-- JS -->
            </div>

            <footer class="chat-footer">
                <i class="fas fa-plus action-icon"></i>
                <i class="fas fa-image action-icon"></i>
                <input type="text" id="msgInput" class="message-input" placeholder="Write a message...">
                <button class="btn btn-primary" onclick="handleSend()" style="padding: 10px 20px;">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </footer>
        </main>
    </div>

    <script>
        const API_BASE_URL = '/api';
        let currentUser = null;
        let currentChatUser = null;
        let contacts = [];
        let pollingInterval = null;

        // Check Login State
        (function() {
            const userJson = localStorage.getItem('user');
            if (!userJson) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = JSON.parse(userJson);
            
            // Navbar updates
            const trigger = document.getElementById('navProfileTrigger');
            const avatar = document.getElementById('navAvatar');
            const nameSpan = document.getElementById('navUserName');
            if (trigger && avatar) {
                trigger.style.display = 'flex';
                avatar.textContent = currentUser.fullName.split(' ').map(n => n[0]).join('');
                if(nameSpan) nameSpan.textContent = currentUser.fullName.split(' ')[0];
            }

            fetchContacts();
        })();

        async function fetchContacts() {
            try {
                const response = await fetch(`${API_BASE_URL}/users`);
                const allUsers = await response.json();
                
                // Filter out current user
                contacts = allUsers.filter(u => u.id !== currentUser.id);
                renderContacts();
                
                // Check for userId in URL
                const urlParams = new URLSearchParams(window.location.search);
                const targetUserId = urlParams.get('userId');

                if (targetUserId) {
                    selectContact(parseInt(targetUserId));
                } else if (contacts.length > 0 && !currentChatUser) {
                    selectContact(contacts[0].id);
                }
            } catch (error) {
                console.error('Error fetching contacts:', error);
            }
        }

        function renderContacts() {
            const list = document.getElementById('contactsList');
            if (!contacts.length) {
                list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-muted);">No contacts found</div>';
                return;
            }

            list.innerHTML = contacts.map(c => `
                <div class="contact-item ${currentChatUser && c.id === currentChatUser.id ? 'active' : ''}" onclick="selectContact(${c.id})">
                    <div class="avatar">
                        ${c.fullName.split(' ').map(n => n[0]).join('')}
                    </div>
                    <div class="contact-info">
                        <h4>${c.fullName}</h4>
                        <p>${(c.role || 'Member') === 'alumni' ? (c.jobTitle || 'Alumni') : 'Student'}</p>
                    </div>
                </div>
            `).join('');
        }

        async function selectContact(userId) {
            const contact = contacts.find(c => c.id === userId);
            if (!contact) return;

            currentChatUser = contact;
            
            // UI Updates
            document.getElementById('activeName').innerText = contact.fullName;
            document.getElementById('activeAvatar').innerText = contact.fullName.split(' ').map(n => n[0]).join('');
            
            renderContacts();
            fetchChatHistory();

            // Setup polling for new messages
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(fetchChatHistory, 3000);
        }

        async function fetchChatHistory() {
            if (!currentChatUser || !currentUser) return;

            try {
                const response = await fetch(`${API_BASE_URL}/messages/history?user1=${currentUser.id}&user2=${currentChatUser.id}`);
                const messages = await response.json();
                renderMessages(messages);
            } catch (error) {
                console.error('Error fetching chat history:', error);
            }
        }

        function renderMessages(messages) {
            const box = document.getElementById('messageBox');
            const isAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 100;

            box.innerHTML = messages.map(m => `
                <div class="message-bubble ${m.senderId === currentUser.id ? 'msg-sent' : 'msg-received'}">
                    ${m.content}
                    <span class="msg-time">${new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                </div>
            `).join('');

            if (isAtBottom) {
                box.scrollTop = box.scrollHeight;
            }
        }

        async function handleSend() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if(!content || !currentChatUser) return;
            
            const messageData = {
                senderId: currentUser.id,
                receiverId: currentChatUser.id,
                content: content
            };

            try {
                input.value = '';
                const response = await fetch(`${API_BASE_URL}/messages/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(messageData)
                });

                if (response.ok) {
                    fetchChatHistory(); // Refresh immediately
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        // Handle Enter key
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleSend();
        });
    </script>
</body>

</html>
