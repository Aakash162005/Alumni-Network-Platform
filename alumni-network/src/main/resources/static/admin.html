<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | RCPIT Alumni Network</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://www.rcpit.ac.in/images/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f1f5f9;
            min-height: 100vh;
        }

        .admin-nav {
            background: var(--primary-dark);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .admin-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        .admin-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .admin-table-header {
            padding: 1.5rem 2rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            padding: 1.2rem 2rem;
            background: #f8fafc;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .admin-table td {
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .role-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-alumni { background: #e0f2fe; color: #0369a1; }
        .badge-student { background: #dcfce7; color: #15803d; }
        .badge-pending { background: #fef3c7; color: #b45309; }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        .admin-search-box {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 300px;
        }

        .admin-search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-family: inherit;
        }
    </style>
</head>

<body>
    <nav class="admin-nav">
        <div class="admin-container" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="logo-group">
                <span class="logo-text" style="color: white;">RCPIT Admin <span style="color: var(--accent);">Portal</span></span>
            </div>
            <button onclick="logout()" class="btn btn-outline btn-sm" style="color: white; border-color: rgba(255,255,255,0.3);">Logout <i class="fas fa-sign-out-alt"></i></button>
        </div>
    </nav>

    <div class="admin-container">
        <header class="admin-header-row">
            <div>
                <h1 class="font-outfit">User Management</h1>
                <p style="color: var(--text-muted);">Review alumni requests and manage platform users.</p>
            </div>
            <div class="admin-search-box">
                <i class="fas fa-search" style="color: #94A3B8;"></i>
                <input type="text" placeholder="Search by name or email...">
            </div>
        </header>

        <div class="admin-card">
            <div class="admin-table-header">
                <h3 class="font-outfit">Registered Users</h3>
                <div class="btn btn-outline btn-sm">Export Data <i class="fas fa-download"></i></div>
            </div>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>User Name</th>
                        <th>Email Address</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userTable">
                    <!-- JS -->
                </tbody>
            </table>
        </div>

        <footer style="margin-top: 3rem; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
            &copy; 2026 R C Patel Institute of Technology • System Administrator Panel
        </footer>
    </div>

    <script>
        // Security Check
        (function() {
            if (localStorage.getItem('isAdmin') !== 'true') {
                window.location.href = 'admin-login.html';
            }
        })();

        function logout() {
            localStorage.removeItem('isAdmin');
            window.location.href = 'admin-login.html';
        }

        let users = [];

        async function fetchUsers() {
            try {
                const response = await fetch('/api/users');
                users = await response.json();
                renderUsers();
            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        const tbody = document.getElementById('userTable');

        function renderUsers() {
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">No users registered yet.</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(u => `
                <tr>
                    <td><strong>${u.fullName}</strong></td>
                    <td>${u.email}</td>
                    <td><span class="role-badge ${u.role === 'alumni' ? 'badge-alumni' : 'badge-student'}">${u.role || 'User'}</span></td>
                    <td><span class="role-badge badge-student">Approved</span></td>
                    <td>
                        <button class="btn btn-outline btn-sm" style="margin-right: 5px;">View</button>
                    </td>
                </tr>
            `).join('');
        }

        fetchUsers();
    </script>
</body>

</html>
