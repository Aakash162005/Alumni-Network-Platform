<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | RCPIT Alumni Network</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://www.rcpit.ac.in/images/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .auth-card {
            width: 100%;
            max-width: 600px;
            padding: 3rem;
            margin: 2rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .input-control {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            transition: var(--transition);
            font-family: inherit;
        }

        .input-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(43, 82, 106, 0.1);
        }

        .auth-btn {
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
            padding: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 640px) {
            .grid-form {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="glass-panel auth-card">
        <div class="auth-header">
            <div class="logo-group" style="margin-bottom: 1.5rem;">
                <span class="logo-sub">Join the Community at</span>
                <span class="logo-text">RCPIT Alumni <span style="color: var(--accent);">Network</span></span>
            </div>
            <h2>Create Account</h2>
            <p>Start your journey with fellow RCPITians</p>
        </div>

        <form id="registerForm">
            <div class="grid-form">
                <div class="input-group full-width">
                    <label>Full Name</label>
                    <input type="text" name="fullname" class="input-control" placeholder="e.g. Rahul Patil" required>
                </div>
                <div class="input-group full-width">
                    <label>Email Address</label>
                    <input type="email" name="email" class="input-control" placeholder="rahul@example.com" required>
                </div>
                <div class="input-group full-width">
                    <label>Password</label>
                    <input type="password" name="password" class="input-control" placeholder="••••••••" required>
                </div>
                <div class="input-group">
                    <label>Role</label>
                    <select name="role" id="roleSelect" class="input-control" required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="student">Student</option>
                        <option value="alumni">Alumni</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Graduation Year</label>
                    <input type="number" name="graduationYear" class="input-control" placeholder="2024" min="1950" max="2030" required>
                </div>
                
                <!-- Conditional Fields -->
                <div id="alumniFields" class="full-width" style="display: none; border-top: 1px solid #e2e8f0; padding-top: 1.5rem;">
                    <div class="grid-form">
                        <div class="input-group">
                            <label>Current Company</label>
                            <input type="text" name="company" class="input-control" placeholder="e.g. TCS, Google">
                        </div>
                        <div class="input-group">
                            <label>Job Title</label>
                            <input type="text" name="jobtitle" class="input-control" placeholder="e.g. Software Engineer">
                        </div>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary auth-btn">Create Professional Account <i class="fas fa-user-plus"></i></button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        const roleSelect = document.getElementById('roleSelect');
        const alumniFields = document.getElementById('alumniFields');

        roleSelect.addEventListener('change', function() {
            if (this.value === 'alumni') {
                alumniFields.style.display = 'block';
                alumniFields.querySelectorAll('input').forEach(i => i.setAttribute('required', 'required'));
            } else {
                alumniFields.style.display = 'none';
                alumniFields.querySelectorAll('input').forEach(i => i.removeAttribute('required'));
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const userData = {
                fullName: formData.get('fullname'),
                email: formData.get('email'),
                password: formData.get('password'),
                role: formData.get('role'),
                graduationYear: parseInt(formData.get('graduationYear')),
            };

            if (userData.role === 'alumni') {
                userData.company = formData.get('company');
                userData.jobTitle = formData.get('jobtitle');
            }

            try {
                const btn = this.querySelector('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                btn.disabled = true;

                const response = await fetch('http://localhost:8080/api/users/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    alert('Registration successful! Redirecting to login...');
                    window.location.href = 'login.html';
                } else {
                    const errorText = await response.text();
                    alert('Registration failed: ' + errorText);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error during registration:', error);
                alert('Error connecting to the server. Make sure the backend is running.');
                const btn = this.querySelector('button');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
