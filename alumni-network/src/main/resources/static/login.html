<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RCPIT Alumni Network</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://www.rcpit.ac.in/images/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            padding: 3rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .input-control {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: white;
            transition: var(--transition);
            font-family: inherit;
        }

        .input-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(43, 82, 106, 0.1);
        }

        .auth-btn {
            width: 100%;
            justify-content: center;
            margin-top: 1rem;
            padding: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--primary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <div class="glass-panel auth-card">
        <div class="auth-header">
            <div class="logo-group" style="margin-bottom: 1.5rem;">
                <span class="logo-sub">Welcome Back to</span>
                <span class="logo-text">RCPIT Alumni <span style="color: var(--accent);">Network</span></span>
            </div>
            <h2>Account Login</h2>
            <p>Access your professional network</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" class="input-control" placeholder="name@example.com" required>
            </div>
            <div class="input-group" style="margin-bottom: 0.8rem;">
                <label>Password</label>
                <input type="password" name="password" class="input-control" placeholder="••••••••" required>
            </div>
            <div style="text-align: right; margin-bottom: 2rem;">
                <a href="#" style="font-size: 0.85rem; color: var(--primary); font-weight: 500;">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary auth-btn">Login to Account <i class="fas fa-sign-in-alt"></i></button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const formData = new FormData(this);
            const loginData = {
                email: formData.get('email'),
                password: formData.get('password')
            };

            try {
                // Show loading state
                const btn = this.querySelector('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                btn.disabled = true;

                const response = await fetch('http://localhost:8080/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });

                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('user', JSON.stringify(user));
                    window.location.href = 'dashboard.html';
                } else {
                    const errorText = await response.text();
                    alert('Login failed: ' + errorText);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error during login:', error);
                alert('Error connecting to the server. Make sure the backend is running.');
                const btn = this.querySelector('button');
                btn.innerHTML = 'Login to Account <i class="fas fa-sign-in-alt"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
