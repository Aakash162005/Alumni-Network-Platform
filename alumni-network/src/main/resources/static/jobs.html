<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal | RCPIT Alumni Network</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://www.rcpit.ac.in/images/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-banner {
            background: linear-gradient(rgba(43, 82, 106, 0.92), rgba(43, 82, 106, 0.92)), url('https://www.rcpit.ac.in/images/slider/slider1.jpg');
            background-size: cover;
            background-position: center;
            padding: 100px 0 60px;
            color: white;
            text-align: center;
        }

        .jobs-container {
            margin-top: -40px;
            padding-bottom: 80px;
        }

        .filter-bar {
            background: white;
            padding: 20px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .job-card-premium {
            background: white;
            border-radius: var(--radius);
            padding: 2.5rem;
            border: 1px solid #f0f0f0;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .job-card-premium:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-strong);
            border-color: var(--primary-light);
        }

        .job-info {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .company-logo {
            width: 70px;
            height: 70px;
            background: rgba(43, 82, 106, 0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .job-details h3 {
            font-size: 1.4rem;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .job-meta {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .job-tags {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .job-tag {
            padding: 4px 12px;
            border-radius: 15px;
            background: #f1f5f9;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .apply-section {
            text-align: right;
        }

        .salary-range {
            display: block;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .job-card-premium {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }
            .job-info {
                flex-direction: column;
                gap: 15px;
            }
            .job-meta {
                justify-content: center;
            }
            .apply-section {
                text-align: center;
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar scrolled">
        <div class="container nav-container">
            <div class="logo-container">
                <a href="profile.html" class="nav-profile-trigger" id="navProfileTrigger">
                    <div class="profile-avatar-xs" id="navAvatar">U</div>
                    <span class="nav-user-name" id="navUserName">User</span>
                </a>
                <a href="index.html" class="logo-group">
                    <span class="logo-sub">R C Patel Institute of Technology</span>
                    <span class="logo-text">Alumni <span style="color: var(--accent);">Network</span></span>
                </a>
            </div>

            <div class="nav-menu">
                <ul>
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="alumni-list.html" class="nav-link">Directory</a></li>
                    <li><a href="jobs.html" class="nav-link active">Jobs</a></li>
                    <li><a href="#" class="nav-link">Events</a></li>
                </ul>
            </div>

            <div class="nav-btns">
                <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="page-banner">
        <div class="container">
            <h1 class="font-outfit">Career Opportunities</h1>
            <p>Exclusive job listings shared by our global alumni community</p>
        </div>
    </div>

    <div class="container jobs-container">
        <div class="filter-bar">
            <div class="filter-item">
                <input type="text" class="btn" style="background: #f8fafc; color: var(--text-main); text-align: left; width: 100%; cursor: text;" placeholder="Job title or keyword...">
            </div>
            <div class="filter-item">
                <select class="btn" style="background: #f8fafc; color: var(--text-main); width: 100%;">
                    <option>All Locations</option>
                    <option>Pune</option>
                    <option>Mumbai</option>
                    <option>Bangalore</option>
                    <option>Remote</option>
                </select>
            </div>
            <button class="btn btn-primary">Find Jobs</button>
        </div>

        <div id="jobsList">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border: none;">
                <p>&copy; 2026 R C Patel Institute of Technology. All Rights Reserved.</p>
                <div class="social-links">
                    <a href="#" style="margin-left: 15px;"><i class="fab fa-linkedin"></i></a>
                    <a href="#" style="margin-left: 15px;"><i class="fab fa-facebook"></i></a>
                    <a href="#" style="margin-left: 15px;"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Check Login State for Navbar
        (function() {
            const userJson = localStorage.getItem('user');
            if (userJson) {
                const user = JSON.parse(userJson);
                const trigger = document.getElementById('navProfileTrigger');
                const avatar = document.getElementById('navAvatar');
                const nameSpan = document.getElementById('navUserName');
                if (trigger && avatar) {
                    trigger.style.display = 'flex';
                    avatar.textContent = user.fullName.split(' ').map(n => n[0]).join('');
                    if(nameSpan) nameSpan.textContent = user.fullName.split(' ')[0];
                }
            }
        })();

        const jobs = [
            { title: "Software Engineer", company: "Google", location: "Pune/Remote", salary: "₹18L - ₹24L", type: "Full Time", posted: "2d ago" },
            { title: "Product Designer", company: "Zomato", location: "Gurugram", salary: "₹12L - ₹18L", type: "Full Time", posted: "5h ago" },
            { title: "Data Scientist", company: "Microsoft", location: "Hyderabad", salary: "₹22L - ₹30L", type: "Full Time", posted: "1d ago" },
            { title: "Frontend Developer", company: "TCS", location: "Mumbai", salary: "₹6L - ₹10L", type: "Full Time", posted: "4d ago" },
            { title: "Backend Intern", company: "Razorpay", location: "Bangalore", salary: "₹40k/mo", type: "Internship", posted: "12h ago" }
        ];

        const list = document.getElementById('jobsList');

        function renderJobs() {
            list.innerHTML = jobs.map(j => `
                <div class="job-card-premium">
                    <div class="job-info">
                        <div class="company-logo">${j.company[0]}</div>
                        <div class="job-details">
                            <h3>${j.title}</h3>
                            <div class="job-meta">
                                <span><i class="fas fa-building"></i> ${j.company}</span>
                                <span><i class="fas fa-map-marker-alt"></i> ${j.location}</span>
                                <span><i class="fas fa-clock"></i> ${j.posted}</span>
                            </div>
                            <div class="job-tags">
                                <span class="job-tag">${j.type}</span>
                                <span class="job-tag">Remote Friendly</span>
                            </div>
                        </div>
                    </div>
                    <div class="apply-section">
                        <span class="salary-range">${j.salary}</span>
                        <button class="btn btn-primary">Apply Now</button>
                    </div>
                </div>
            `).join('');
        }

        renderJobs();
    </script>
</body>

</html>
